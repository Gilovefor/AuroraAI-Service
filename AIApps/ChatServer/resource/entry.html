<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡码AI助手</title>
    <style>
        :root {
            --primary: #00c3ff;
            --primary-hover: #00e1ff;
            --text-main: #f4f8ff;
            --text-muted: rgba(244, 248, 255, 0.72);
            --panel-bg: rgba(18, 24, 38, 0.56);
            --panel-border: rgba(255, 255, 255, 0.16);
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.24);
            --shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            color: var(--text-main);
            background: radial-gradient(circle at 15% 20%, rgba(0, 195, 255, 0.25), transparent 45%), radial-gradient(circle at 85% 80%, rgba(146, 141, 171, 0.3), transparent 45%), linear-gradient(135deg, #1f1c2c, #2b3248 55%, #3a3f5f);
        }

        .page {
            width: min(420px, 100%);
        }

        .title {
            margin: 0 0 22px;
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #80e9ff, #c5d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 6px 22px rgba(0, 195, 255, 0.26);
        }

        .container {
            width: 100%;
            padding: 26px 24px 22px;
            border-radius: 18px;
            border: 1px solid var(--panel-border);
            background: var(--panel-bg);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

            .container:hover {
                transform: translateY(-2px);
                box-shadow: 0 16px 42px rgba(0, 0, 0, 0.42);
            }

        h2 {
            margin: 0 0 18px;
            font-size: 24px;
            text-align: center;
            color: #ecf4ff;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

            .form-group label {
                display: block;
                margin-bottom: 6px;
                font-size: 13px;
                color: var(--text-muted);
            }

            .form-group input {
                width: 100%;
                padding: 11px 12px;
                font-size: 14px;
                color: #ffffff;
                border: 1px solid var(--input-border);
                border-radius: 10px;
                outline: none;
                background: var(--input-bg);
                transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            }

                .form-group input::placeholder {
                    color: rgba(244, 248, 255, 0.45);
                }

                .form-group input:focus {
                    border-color: var(--primary);
                    box-shadow: 0 0 0 3px rgba(0, 195, 255, 0.18);
                    background: rgba(255, 255, 255, 0.12);
                }

        .btn {
            width: 100%;
            margin-top: 4px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            color: #052334;
            background: linear-gradient(90deg, var(--primary), #5de3ff);
            box-shadow: 0 0 12px rgba(0, 195, 255, 0.55);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

            .btn:hover {
                transform: translateY(-1px);
                filter: brightness(1.04);
                box-shadow: 0 0 18px rgba(0, 225, 255, 0.66);
                background: linear-gradient(90deg, var(--primary-hover), #7ceaff);
            }

        .switch {
            margin-top: 14px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }

            .switch a {
                color: #9cecff;
                text-decoration: none;
                cursor: pointer;
            }

                .switch a:hover {
                    text-decoration: underline;
                }

        #register-container {
            display: none;
        }

        #success-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            z-index: 1000;
            padding: 11px 22px;
            border-radius: 10px;
            font-weight: 700;
            color: #0a2430;
            background: linear-gradient(90deg, #7ceaff, #8dd8ff);
            box-shadow: 0 8px 20px rgba(0, 195, 255, 0.36);
        }

        @media (max-width: 420px) {
            body {
                padding: 14px;
            }

            .container {
                padding: 22px 18px 18px;
                border-radius: 14px;
            }

            .title {
                font-size: 30px;
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="success-alert">提示信息</div>

    <body>
    <div id="success-alert">提示信息</div>

    <div class="page">
        <h1 class="title">卡码AI助手</h1>

        <!-- 登录 -->
        <div class="container" id="login-container">
            <h2>登录</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn">登录</button>
            </form>
            <div class="switch">
                没有账号？<a onclick="showRegister()">去注册账号</a>
            </div>
        </div>

        <!-- 注册 -->
        <div class="container" id="register-container">
            <h2>注册</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="register-username">用户名</label>
                    <input type="text" id="register-username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="register-password">密码</label>
                    <input type="password" id="register-password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn">注册</button>
            </form>
            <div class="switch">
                已有账号？<a onclick="showLogin()">返回登录</a>
            </div>
        </div>
    </div>

    <script>
    function showAlert(message){
        const alertBox = document.getElementById('success-alert');
        alertBox.textContent = message;
        alertBox.style.display = 'block';
        setTimeout(()=>{alertBox.style.display='none';},1000);
    }
    function showRegister(){ document.getElementById('login-container').style.display='none'; document.getElementById('register-container').style.display='block'; }
    function showLogin(){ document.getElementById('register-container').style.display='none'; document.getElementById('login-container').style.display='block'; }

    // 登录
    document.getElementById('login-form').addEventListener('submit', function(e){
        e.preventDefault();
        const username=document.getElementById('login-username').value;
        const password=document.getElementById('login-password').value;

        fetch('/login',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({username,password})
        }).then(response=>{
            if(response.status===403){ showAlert('账号已在其他地方登录！'); throw new Error('已在其他地方登录'); }
            const contentType = response.headers.get('content-type');
            if(response.status===200){
                if(contentType && contentType.includes('application/json')) return response.json();
                else throw new Error('返回格式错误');
            }else if(response.status===401){ showAlert('账号或密码错误！'); throw new Error('认证失败'); }
            else throw new Error('请求失败');
        }).then(data=>{
            if(data && data.userId){ sessionStorage.setItem('userId', data.userId); showAlert('登录成功！'); window.location.href='/menu'; }
            else throw new Error('无效的响应数据');
        }).catch(error=>{
            console.error('Error:',error);
            if(!error.message.includes('已在其他地方登录')&&!error.message.includes('认证失败')) showAlert('操作失败，请重试');
        });
    });

    // 注册
    document.getElementById('register-form').addEventListener('submit', function(e){
        e.preventDefault();
        const username=document.getElementById('register-username').value;
        const password=document.getElementById('register-password').value;

        fetch('/register',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({username,password})
        }).then(response=>{
            if(response.status===200){
                showAlert('注册成功！');
                document.getElementById('login-username').value=username;
                document.getElementById('login-password').value=password;
                setTimeout(showLogin,1000);
            }else if(response.status===409){ alert('用户名已被注册，请重新输入！'); }
        }).catch(error=>console.error('注册错误:',error));
    });
    </script>

    <script>
        function showAlert(message) {
            const alertBox = document.getElementById('success-alert');
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 1000);
        }
        function showRegister() { document.getElementById('login-container').style.display = 'none'; document.getElementById('register-container').style.display = 'block'; }
        function showLogin() { document.getElementById('register-container').style.display = 'none'; document.getElementById('login-container').style.display = 'block'; }

        // 登录
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            }).then(response => {
                if (response.status === 403) { showAlert('账号已在其他地方登录！'); throw new Error('已在其他地方登录'); }
                const contentType = response.headers.get('content-type');
                if (response.status === 200) {
                    if (contentType && contentType.includes('application/json')) return response.json();
                    else throw new Error('返回格式错误');
                } else if (response.status === 401) { showAlert('账号或密码错误！'); throw new Error('认证失败'); }
                else throw new Error('请求失败');
            }).then(data => {
                if (data && data.userId) { sessionStorage.setItem('userId', data.userId); showAlert('登录成功！'); window.location.href = '/menu'; }
                else throw new Error('无效的响应数据');
            }).catch(error => {
                console.error('Error:', error);
                if (!error.message.includes('已在其他地方登录') && !error.message.includes('认证失败')) showAlert('操作失败，请重试');
            });
        });

        // 注册
        document.getElementById('register-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;

            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            }).then(response => {
                if (response.status === 200) {
                    showAlert('注册成功！');
                    document.getElementById('login-username').value = username;
                    document.getElementById('login-password').value = password;
                    setTimeout(showLogin, 1000);
                } else if (response.status === 409) { alert('用户名已被注册，请重新输入！'); }
            }).catch(error => console.error('注册错误:', error));
        });
    </script>
